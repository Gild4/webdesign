        // Enhanced code quality improvements

        // Fixing streak calculation logic
        let streak = 0;

        function calculateStreak(bets) {
            streak = 0;
            for (let bet of bets) {
                if (bet.isWin) streak++;
                else streak = 0;
            }
        }

        // Improving error handling for bet validation
        function validateBet(bet) {
            if (bet <= 0) {
                throw new Error("Bet must be greater than zero.");
            }
            return true;
        }

        // Adding input sanitization
        function sanitizeInput(input) {
            return input.replace(/<[^>]*>/g, '');
        }

        // Fixing time elapsed calculation

            // Utilize elapsedTime to track round duration

        // Adding null safety checks

            if (!bet) return;
            try {
                validateBet(bet);
                // Process bet
            } catch (error) {
                console.error(error);
            }
        }
    </script>
