<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
</head>
<body>
    <h1>Current Date and Time</h1>
    <div id="clock"></div>
    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toUTCString();
        }, 1000);
    </script>
</body>
</html>
