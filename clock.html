<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .timezone-name {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        .period {
            font-size: 18px;
            color: #764ba2;
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container" id="clockContainer"></div>

    <script>
        const timezones = [
            { name: 'UTC', zone: 'UTC' },
            { name: 'Eastern Time', zone: 'America/New_York' },
            { name: 'Central Time', zone: 'America/Chicago' },
            { name: 'Mountain Time', zone: 'America/Denver' },
            { name: 'Pacific Time', zone: 'America/Los_Angeles' },
            { name: 'London', zone: 'Europe/London' },
            { name: 'Paris', zone: 'Europe/Paris' },
            { name: 'Tokyo', zone: 'Asia/Tokyo' },
            { name: 'Sydney', zone: 'Australia/Sydney' },
            { name: 'Dubai', zone: 'Asia/Dubai' }
        ];

        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function formatDate(date) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function updateClocks() {
            const container = document.getElementById('clockContainer');
            
            if (container.children.length === 0) {
                // Create clock cards on first load
                timezones.forEach(tz => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    card.innerHTML = `
                        <div class="timezone-name">${tz.name}</div>
                        <div class="time-display" id="time-${tz.zone}">--:--:--</div>
                        <div class="date-display" id="date-${tz.zone}"></div>
                        <div class="period" id="period-${tz.zone}"></div>
                    `;
                    container.appendChild(card);
                });
            }

            // Update all clocks
            timezones.forEach(tz => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.zone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.zone,
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const periodFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.zone,
                    hour: 'numeric',
                    hour12: true
                });

                const timeParts = formatter.formatToParts(now);
                const timeString = timeParts.map(p => p.value).join('');
                const dateString = dateFormatter.format(now);
                const periodString = periodFormatter.format(now).split(' ')[1];

                document.getElementById(`time-${tz.zone}`).textContent = timeString;
                document.getElementById(`date-${tz.zone}`).textContent = dateString;
                document.getElementById(`period-${tz.zone}`).textContent = periodString;
            });
        }

        // Update clocks immediately and then every second
        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
