<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Crash - Cash Out Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #475569;
            --train-color: #e74c3c;
            --train-dark: #c0392b;
            --track-color: #7f8c8d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-display {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .balance {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .balance-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        /* Main Game Area */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Game Canvas Area */
        .game-area {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
        }

        .game-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-waiting {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .status-running {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-crashed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-waiting .status-dot {
            background: var(--primary);
        }

        .status-running .status-dot {
            background: var(--success);
        }

        .status-crashed .status-dot {
            background: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .canvas-container {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .multiplier-display {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            padding: 16px 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .multiplier-value {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .multiplier-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .crashed-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(239, 68, 68, 0.2);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 20;
        }

        .crashed-overlay.active {
            display: flex;
        }

        .crashed-text {
            font-size: 56px;
            font-weight: 800;
            color: var(--danger);
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .crashed-multiplier {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 10px;
        }

        /* History Bar */
        .history-bar {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg-card);
        }

        .history-item {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            min-width: 70px;
            text-align: center;
        }

        .history-win {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .history-loss {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        /* Betting Panel */
        .betting-panel {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .bet-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .bet-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .bet-input {
            width: 100%;
            padding: 16px 16px 16px 40px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .bet-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .quick-bets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .quick-bet-btn {
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-bet-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .auto-cashout-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auto-cashout-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-input);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auto-cashout-toggle.active {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--success);
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            position: relative;
            transition: all 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--text-primary);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        .auto-cashout-toggle.active .toggle-switch {
            background: var(--success);
        }

        .auto-cashout-toggle.active .toggle-switch::after {
            left: 22px;
        }

        .auto-cashout-input {
            display: none;
            margin-top: 12px;
        }

        .auto-cashout-toggle.active + .auto-cashout-input {
            display: flex;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-cashout {
            animation: cashoutPulse 1s infinite;
        }

        @keyframes cashoutPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .stat-card {
            background: var(--bg-input);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .stat-value.win {
            color: var(--success);
        }

        .stat-value.loss {
            color: var(--danger);
        }

        /* Live Bets */
        .live-bets {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .live-bets-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .live-bet-item:last-child {
            border-bottom: none;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .player-name {
            font-size: 14px;
            font-weight: 500;
        }

        .player-bet {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .player-cashout {
            font-size: 14px;
            font-weight: 600;
            color: var(--success);
        }

        .player-waiting {
            font-size: 14px;
            color: var(--warning);
        }

        /* Countdown Overlay */
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 30;
        }

        .countdown-overlay.active {
            display: flex;
        }

        .countdown-text {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .countdown-value {
            font-size: 96px;
            font-weight: 800;
            color: var(--primary);
            animation: countdownPulse 1s infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            min-width: 300px;
        }

        .toast-success {
            border-color: var(--success);
        }

        .toast-error {
            border-color: var(--danger);
        }

        .toast-icon {
            font-size: 20px;
        }

        .toast-message {
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Footer Credit */
        .footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 24px 0;
            margin-top: 40px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer-text span {
            color: var(--primary);
            font-weight: 600;
        }

        .footer-heart {
            color: var(--danger);
            animation: heartBeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .designer-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(16, 185, 129, 0.2));
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-left: 12px;
        }

        .designer-badge svg {
            width: 16px;
            height: 16px;
            fill: var(--primary);
        }

        .designer-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }

            .multiplier-value {
                font-size: 40px;
            }

            .canvas-container {
                height: 300px;
            }

            .betting-panel {
                padding: 16px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 16px;
            }

            .footer-content {
                flex-direction: column;
                gap: 12px;
            }

            .designer-badge {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🚂</div>
                <span class="logo-text">Train Crash</span>
            </div>
            <div class="balance-display">
                <div class="balance">
                    <div class="balance-label">Balance</div>
                    <div class="balance-amount">$<span id="balance">1000.00</span></div>
                </div>
            </div>
        </header>

        <!-- Main Game Layout -->
        <div class="game-layout">
            <!-- Game Area -->
            <div class="game-area">
                <div class="game-header">
                    <h2 class="game-title">🚂 Train Crash Game</h2>
                    <div class="game-status status-waiting" id="gameStatus">
                        <span class="status-dot"></span>
                        <span id="statusText">Waiting</span>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="gameCanvas"></canvas>
                    <div class="multiplier-display">
                        <div class="multiplier-value" id="multiplierValue">1.00x</div>
                        <div class="multiplier-label">Current Multiplier</div>
                    </div>
                    <div class="crashed-overlay" id="crashedOverlay">
                        <div class="crashed-text">💥 CRASHED!</div>
                        <div class="crashed-multiplier" id="crashedMultiplier">2.45x</div>
                    </div>
                    <div class="countdown-overlay" id="countdownOverlay">
                        <div class="countdown-text">Next Round Starting In</div>
                        <div class="countdown-value" id="countdownValue">5</div>
                    </div>
                </div>

                <div class="history-bar" id="historyBar">
                    <!-- History items will be added here -->
                </div>
            </div>

            <!-- Betting Panel -->
            <div class="betting-panel">
                <h3 class="panel-title">Place Your Bet</h3>

                <div class="bet-input-group">
                    <label class="input-label">Bet Amount</label>
                    <div class="bet-input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" class="bet-input" id="betAmount" value="10" min="1" max="1000" step="1">
                    </div>
                    <div class="quick-bets">
                        <button class="quick-bet-btn" data-amount="5">$5</button>
                        <button class="quick-bet-btn" data-amount="10">$10</button>
                        <button class="quick-bet-btn" data-amount="25">$25</button>
                        <button class="quick-bet-btn" data-amount="50">$50</button>
                        <button class="quick-bet-btn" data-amount="100">$100</button>
                        <button class="quick-bet-btn" data-amount="250">$250</button>
                        <button class="quick-bet-btn" data-amount="500">$500</button>
                        <button class="quick-bet-btn" data-amount="1000">$1K</button>
                    </div>
                </div>

                <div class="auto-cashout-group">
                    <div class="auto-cashout-toggle" id="autoCashoutToggle">
                        <span class="toggle-label">
                            <span>⚡ Auto Cashout</span>
                        </span>
                        <div class="toggle-switch"></div>
                    </div>
                    <div class="auto-cashout-input">
                        <label class="input-label">Cashout At Multiplier</label>
                        <div class="bet-input-wrapper">
                            <input type="number" class="bet-input" id="autoCashoutValue" value="2.0" min="1.1" max="100" step="0.1">
                            <span class="currency-symbol" style="left: auto; right: 16px;">x</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="placeBetBtn">Place Bet</button>
                    <button class="btn btn-success btn-cashout" id="cashoutBtn" disabled>Cash Out</button>
                    <button class="btn btn-danger" id="cancelBetBtn" disabled>Cancel Bet</button>
                </div>

                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-value win" id="totalWins">0</div>
                        <div class="stat-label">Total Wins</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value loss" id="totalLosses">0</div>
                        <div class="stat-label">Total Losses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="biggestWin">$0</div>
                        <div class="stat-label">Biggest Win</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="currentStreak">0</div>
                        <div class="stat-label">Current Streak</div>
                    </div>
                </div>

                <div class="live-bets">
                    <div class="live-bets-title">👥 Live Bets</div>
                    <div id="liveBetsList">
                        <!-- Live bets will be added here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">
                Made with <span class="footer-heart">❤</span> 
                <span class="designer-badge">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                    </svg>
                    <span class="designer-name">Designed by Benson Maina</span>
                </span>
            </p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Game State
        const state = {
            balance: 1000,
            currentBet: 0,
            currentMultiplier: 1.00,
            crashPoint: 0,
            gameStatus: 'waiting',
            hasBet: false,
            hasCashedOut: false,
            cashoutMultiplier: 0,
            autoCashoutEnabled: false,
            autoCashoutValue: 2.0,
            history: [],
            stats: {
                wins: 0,
                losses: 0,
                biggestWin: 0,
                streak: 0
            },
            countdown: 5,
            liveBets: [],
            trainPosition: 0,
            particles: []
        };

        // DOM Elements
        const elements = {
            balance: document.getElementById('balance'),
            multiplierValue: document.getElementById('multiplierValue'),
            gameStatus: document.getElementById('gameStatus'),
            statusText: document.getElementById('statusText'),
            crashedOverlay: document.getElementById('crashedOverlay'),
            crashedMultiplier: document.getElementById('crashedMultiplier'),
            countdownOverlay: document.getElementById('countdownOverlay'),
            countdownValue: document.getElementById('countdownValue'),
            betAmount: document.getElementById('betAmount'),
            autoCashoutToggle: document.getElementById('autoCashoutToggle'),
            autoCashoutValue: document.getElementById('autoCashoutValue'),
            placeBetBtn: document.getElementById('placeBetBtn'),
            cashoutBtn: document.getElementById('cashoutBtn'),
            cancelBetBtn: document.getElementById('cancelBetBtn'),
            historyBar: document.getElementById('historyBar'),
            liveBetsList: document.getElementById('liveBetsList'),
            totalWins: document.getElementById('totalWins'),
            totalLosses: document.getElementById('totalLosses'),
            biggestWin: document.getElementById('biggestWin'),
            currentStreak: document.getElementById('currentStreak'),
            toastContainer: document.getElementById('toastContainer'),
            canvas: document.getElementById('gameCanvas')
        };

        // Canvas Setup
        const ctx = elements.canvas.getContext('2d');
        let animationId = null;
        let startTime = 0;

        function resizeCanvas() {
            const container = elements.canvas.parentElement;
            elements.canvas.width = container.offsetWidth * window.devicePixelRatio;
            elements.canvas.height = container.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Generate Crash Point
        function generateCrashPoint() {
            const houseEdge = 0.04;
            const random = Math.random();
            const crashPoint = (1 - houseEdge) / (1 - random);
            return Math.max(1.00, Math.min(crashPoint, 100));
        }

        // Update Balance Display
        function updateBalance() {
            elements.balance.textContent = state.balance.toFixed(2);
        }

        // Update Stats Display
        function updateStats() {
            elements.totalWins.textContent = state.stats.wins;
            elements.totalLosses.textContent = state.stats.losses;
            elements.biggestWin.textContent = `$${state.stats.biggestWin.toFixed(2)}`;
            elements.currentStreak.textContent = state.stats.streak;
        }

        // Update Game Status
        function updateGameStatus(status, text) {
            state.gameStatus = status;
            elements.gameStatus.className = `game-status status-${status}`;
            elements.statusText.textContent = text;
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
                <span class="toast-message">${message}</span>
            `;
            elements.toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add to History
        function addToHistory(multiplier) {
            state.history.unshift(multiplier);
            if (state.history.length > 20) {
                state.history.pop();
            }

            const historyItem = document.createElement('div');
            historyItem.className = `history-item ${multiplier >= 2 ? 'history-win' : 'history-loss'}`;
            historyItem.textContent = `${multiplier.toFixed(2)}x`;

            elements.historyBar.insertBefore(historyItem, elements.historyBar.firstChild);

            if (elements.historyBar.children.length > 20) {
                elements.historyBar.lastChild.remove();
            }
        }

        // Generate Live Bets
        function generateLiveBets() {
            const names = ['Player123', 'LuckyWin', 'CryptoKing', 'BetMaster', 'HighRoller', 'QuickCash', 'MoonBoy', 'DiamondHands'];
            state.liveBets = [];

            const numBets = Math.floor(Math.random() * 5) + 3;
            for (let i = 0; i < numBets; i++) {
                state.liveBets.push({
                    name: names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100),
                    bet: Math.floor(Math.random() * 500) + 10,
                    cashoutAt: (Math.random() * 5 + 1.1).toFixed(2),
                    cashedOut: false
                });
            }

            renderLiveBets();
        }

        // Render Live Bets
        function renderLiveBets() {
            elements.liveBetsList.innerHTML = '';

            state.liveBets.forEach(bet => {
                const betItem = document.createElement('div');
                betItem.className = 'live-bet-item';

                const initials = bet.name.substring(0, 2).toUpperCase();
                const status = bet.cashedOut 
                    ? `<span class="player-cashout">${bet.cashoutAt}x</span>`
                    : state.gameStatus === 'running'
                    ? `<span class="player-waiting">Playing</span>`
                    : `<span class="player-bet">$${bet.bet}</span>`;

                betItem.innerHTML = `
                    <div class="player-info">
                        <div class="player-avatar">${initials}</div>
                        <div>
                            <div class="player-name">${bet.name}</div>
                            <div class="player-bet">$${bet.bet}</div>
                        </div>
                    </div>
                    ${status}
                `;

                elements.liveBetsList.appendChild(betItem);
            });
        }

        // Draw Train
        function drawTrain(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Train body (main)
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.roundRect(-40, -25, 80, 35, 5);
            ctx.fill();

            // Train body (darker bottom)
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.roundRect(-40, 5, 80, 15, 3);
            ctx.fill();

            // Windows
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.roundRect(-30, -18, 15, 15, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(-10, -18, 15, 15, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(10, -18, 15, 15, 3);
            ctx.fill();

            // Front window
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.roundRect(25, -20, 12, 20, 3);
            ctx.fill();

            // Chimney
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-25, -40, 12, 18);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(-28, -42, 18, 5);

            // Smoke
            if (state.gameStatus === 'running') {
                const smokeOffset = Math.sin(Date.now() / 200) * 3;
                ctx.fillStyle = 'rgba(100, 100, 100, 0.6)';
                ctx.beginPath();
                ctx.arc(-19 + smokeOffset, -50, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-19 + smokeOffset - 5, -58, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            // Wheels
            ctx.fillStyle = '#2c3e50';
            // Back wheel
            ctx.beginPath();
            ctx.arc(-25, 20, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.arc(-25, 20, 6, 0, Math.PI * 2);
            ctx.fill();

            // Middle wheel
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(0, 20, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.arc(0, 20, 6, 0, Math.PI * 2);
            ctx.fill();

            // Front wheel
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(25, 20, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.arc(25, 20, 6, 0, Math.PI * 2);
            ctx.fill();

            // Wheel connectors
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-25, 20);
            ctx.lineTo(25, 20);
            ctx.stroke();

            // Headlight
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(38, -5, 5, 0, Math.PI * 2);
            ctx.fill();

            // Headlight glow
            if (state.gameStatus === 'running') {
                const glow = ctx.createRadialGradient(38, -5, 0, 38, -5, 30);
                glow.addColorStop(0, 'rgba(241, 196, 15, 0.8)');
                glow.addColorStop(1, 'rgba(241, 196, 15, 0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(38, -5, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // Draw Tracks
        function drawTracks(width, height) {
            const trackY = height - 80;

            // Ground
            const groundGradient = ctx.createLinearGradient(0, trackY, 0, height);
            groundGradient.addColorStop(0, '#2d3436');
            groundGradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, trackY, width, height - trackY);

            // Track bed (gravel)
            ctx.fillStyle = '#636e72';
            ctx.fillRect(0, trackY, width, 15);

            // Rails
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, trackY - 5, width, 4);
            ctx.fillRect(0, trackY + 8, width, 4);

            // Sleepers (ties)
            ctx.fillStyle = '#5d4e37';
            const sleeperSpacing = 40;
            const offset = (state.trainPosition * 5) % sleeperSpacing;
            for (let i = -offset; i < width; i += sleeperSpacing) {
                ctx.fillRect(i, trackY - 8, 12, 24);
            }

            // Track markers
            ctx.fillStyle = '#95a5a6';
            ctx.font = 'bold 14px Inter';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const x = (width / 5) * i;
                ctx.fillText(`${i}x`, x, trackY + 45);
            }
        }

        // Draw Background
        function drawBackground(width, height) {
            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height - 80);
            skyGradient.addColorStop(0, '#0f0f23');
            skyGradient.addColorStop(0.5, '#1a1a3e');
            skyGradient.addColorStop(1, '#2d2d5a');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height - 80);

            // Stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 123.456) * 0.5 + 0.5) * width;
                const y = (Math.cos(i * 78.901) * 0.5 + 0.5) * (height - 150);
                const size = Math.random() * 2 + 1;
                const opacity = Math.random() * 0.5 + 0.3;
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Mountains in background
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(0, height - 80);
            for (let i = 0; i <= width; i += 50) {
                const mountainHeight = Math.sin(i * 0.02) * 30 + Math.cos(i * 0.01) * 20;
                ctx.lineTo(i, height - 80 - mountainHeight - 50);
            }
            ctx.lineTo(width, height - 80);
            ctx.closePath();
            ctx.fill();
        }

        // Draw Particles (explosion)
        function drawParticles(width, height, crashX) {
            const crashY = height - 100;

            state.particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.vy += 0.3;
                particle.life -= 0.02;

                if (particle.life > 0) {
                    ctx.globalAlpha = particle.life;
                    ctx.fillStyle = particle.color;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    state.particles.splice(index, 1);
                }
            });

            ctx.globalAlpha = 1;

            // Continue generating particles after crash
            if (state.gameStatus === 'crashed' && state.particles.length < 100) {
                for (let i = 0; i < 3; i++) {
                    state.particles.push({
                        x: crashX,
                        y: crashY,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        size: Math.random() * 8 + 4,
                        color: ['#e74c3c', '#f39c12', '#f1c40f', '#95a5a6'][Math.floor(Math.random() * 4)],
                        life: 1
                    });
                }
            }
        }

        // Draw Game Canvas
        function drawCanvas() {
            const width = elements.canvas.offsetWidth;
            const height = elements.canvas.offsetHeight;

            ctx.clearRect(0, 0, width, height);

            // Draw background
            drawBackground(width, height);

            // Draw tracks
            drawTracks(width, height);

            // Calculate train position based on multiplier
            const maxMultiplier = 5;
            const progress = Math.min((state.currentMultiplier - 1) / (maxMultiplier - 1), 1);
            const trackY = height - 100;
            const startX = 50;
            const endX = width - 100;
            const trainX = startX + (endX - startX) * progress;

            state.trainPosition = progress;

            // Draw train
            const trainScale = 0.8 + progress * 0.2;
            drawTrain(trainX, trackY, trainScale);

            // Draw particles if crashed
            if (state.gameStatus === 'crashed') {
                drawParticles(width, height, trainX);
            }

            // Draw speed lines when running
            if (state.gameStatus === 'running') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 10; i++) {
                    const lineX = (trainX - 100 + Math.random() * 80) % width;
                    const lineY = Math.random() * (height - 150);
                    const lineLength = Math.random() * 30 + 20;
                    ctx.beginPath();
                    ctx.moveTo(lineX, lineY);
                    ctx.lineTo(lineX - lineLength, lineY);
                    ctx.stroke();
                }
            }
        }

        // Game Loop
        function gameLoop() {
            if (state.gameStatus !== 'running') return;

            const timeElapsed = (Date.now() - startTime) / 1000;
            state.currentMultiplier = 1.00 + (Math.pow(timeElapsed, 2) * 0.1);

            elements.multiplierValue.textContent = `${state.currentMultiplier.toFixed(2)}x`;

            // Change color based on multiplier
            if (state.currentMultiplier < 2) {
                elements.multiplierValue.style.background = 'linear-gradient(135deg, #10b981, #6366f1)';
            } else if (state.currentMultiplier < 5) {
                elements.multiplierValue.style.background = 'linear-gradient(135deg, #f59e0b, #ef4444)';
            } else {
                elements.multiplierValue.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            }
            elements.multiplierValue.style.webkitBackgroundClip = 'text';
            elements.multiplierValue.style.webkitTextFillColor = 'transparent';

            // Check auto cashout
            if (state.autoCashoutEnabled && !state.hasCashedOut && state.hasBet) {
                if (state.currentMultiplier >= state.autoCashoutValue) {
                    cashOut();
                }
            }

            // Check crash
            if (state.currentMultiplier >= state.crashPoint) {
                state.currentMultiplier = state.crashPoint;
                crash();
                return;
            }

            drawCanvas();
            renderLiveBets();

            animationId = requestAnimationFrame(gameLoop);
        }

        // Start Countdown
        function startCountdown() {
            updateGameStatus('waiting', 'Waiting');
            elements.countdownOverlay.classList.add('active');
            elements.crashedOverlay.classList.remove('active');
            state.countdown = 5;
            state.particles = [];

            const countdownInterval = setInterval(() => {
                state.countdown--;
                elements.countdownValue.textContent = state.countdown;

                if (state.countdown <= 0) {
                    clearInterval(countdownInterval);
                    elements.countdownOverlay.classList.remove('active');
                    startRound();
                }
            }, 1000);
        }

        // Start Round
        function startRound() {
            state.currentMultiplier = 1.00;
            state.crashPoint = generateCrashPoint();
            state.hasCashedOut = false;
            state.cashoutMultiplier = 0;
            state.particles = [];
            startTime = Date.now();

            updateGameStatus('running', 'Running');
            elements.multiplierValue.textContent = '1.00x';
            elements.multiplierValue.style.background = 'linear-gradient(135deg, #10b981, #6366f1)';
            elements.multiplierValue.style.webkitBackgroundClip = 'text';
            elements.multiplierValue.style.webkitTextFillColor = 'transparent';

            elements.placeBetBtn.disabled = true;
            elements.cancelBetBtn.disabled = true;

            if (state.hasBet) {
                elements.cashoutBtn.disabled = false;
            }

            generateLiveBets();
            drawCanvas();
            gameLoop();

            console.log('Crash Point (debug):', state.crashPoint.toFixed(2));
        }

        // Crash
        function crash() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            updateGameStatus('crashed', 'Crashed');
            elements.crashedMultiplier.textContent = `${state.crashPoint.toFixed(2)}x`;
            elements.crashedOverlay.classList.add('active');

            elements.multiplierValue.textContent = `${state.crashPoint.toFixed(2)}x`;
            elements.multiplierValue.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            elements.multiplierValue.style.webkitBackgroundClip = 'text';
            elements.multiplierValue.style.webkitTextFillColor = 'transparent';

            // Create explosion particles
            const width = elements.canvas.offsetWidth;
            const height = elements.canvas.offsetHeight;
            const crashX = 50 + (width - 150) * Math.min((state.crashPoint - 1) / 4, 1);
            const crashY = height - 100;

            for (let i = 0; i < 50; i++) {
                state.particles.push({
                    x: crashX,
                    y: crashY,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    size: Math.random() * 10 + 5,
                    color: ['#e74c3c', '#f39c12', '#f1c40f', '#95a5a6', '#2c3e50'][Math.floor(Math.random() * 5)],
                    life: 1
                });
            }

            // Animate particles
            function animateParticles() {
                if (state.gameStatus === 'crashed' && state.particles.length > 0) {
                    drawCanvas();
                    requestAnimationFrame(animateParticles);
                }
            }
            animateParticles();

            if (state.hasBet && !state.hasCashedOut) {
                state.stats.losses++;
                state.stats.streak = state.stats.streak > 0 ? -1 : -1;
                showToast(`Train crashed at ${state.crashPoint.toFixed(2)}x. You lost $${state.currentBet.toFixed(2)}`, 'error');
            }

            state.liveBets.forEach(bet => {
                if (!bet.cashedOut && parseFloat(bet.cashoutAt) <= state.crashPoint) {
                    bet.cashedOut = true;
                }
            });

            addToHistory(state.crashPoint);
            updateStats();

            elements.cashoutBtn.disabled = true;
            elements.placeBetBtn.disabled = false;

            state.hasBet = false;
            state.currentBet = 0;

            setTimeout(() => {
                startCountdown();
            }, 4000);
        }

        // Place Bet
        function placeBet() {
            const betAmount = parseFloat(elements.betAmount.value);

            if (isNaN(betAmount) || betAmount < 1) {
                showToast('Please enter a valid bet amount (minimum $1)', 'error');
                return;
            }

            if (betAmount > state.balance) {
                showToast('Insufficient balance', 'error');
                return;
            }

            if (state.gameStatus !== 'waiting') {
                showToast('Please wait for the next round', 'error');
                return;
            }

            state.balance -= betAmount;
            state.currentBet = betAmount;
            state.hasBet = true;

            updateBalance();

            elements.placeBetBtn.disabled = true;
            elements.cancelBetBtn.disabled = false;
            elements.betAmount.disabled = true;

            showToast(`Bet placed: $${betAmount.toFixed(2)} 🚂`, 'success');
        }

        // Cancel Bet
        function cancelBet() {
            if (!state.hasBet) return;

            state.balance += state.currentBet;
            state.currentBet = 0;
            state.hasBet = false;

            updateBalance();

            elements.placeBetBtn.disabled = false;
            elements.cancelBetBtn.disabled = true;
            elements.betAmount.disabled = false;

            showToast('Bet cancelled', 'success');
        }

        // Cash Out
        function cashOut() {
            if (!state.hasBet || state.hasCashedOut || state.gameStatus !== 'running') return;

            state.hasCashedOut = true;
            state.cashoutMultiplier = state.currentMultiplier;
            const winAmount = state.currentBet * state.cashoutMultiplier;

            state.balance += winAmount;
            state.stats.wins++;
            state.stats.streak = state.stats.streak >= 0 ? state.stats.streak + 1 : 1;

            if (winAmount > state.stats.biggestWin) {
                state.stats.biggestWin = winAmount;
            }

            updateBalance();
            updateStats();

            elements.cashoutBtn.disabled = true;

            showToast(`Cashed out at ${state.cashoutMultiplier.toFixed(2)}x! Won $${winAmount.toFixed(2)} 🎉`, 'success');

            state.liveBets.forEach(bet => {
                if (!bet.cashedOut && bet.name.startsWith('You')) {
                    bet.cashedOut = true;
                    bet.cashoutAt = state.cashoutMultiplier.toFixed(2);
                }
            });
        }

        // Toggle Auto Cashout
        function toggleAutoCashout() {
            state.autoCashoutEnabled = !state.autoCashoutEnabled;
            elements.autoCashoutToggle.classList.toggle('active', state.autoCashoutEnabled);
        }

        // Event Listeners
        elements.placeBetBtn.addEventListener('click', placeBet);
        elements.cancelBetBtn.addEventListener('click', cancelBet);
        elements.cashoutBtn.addEventListener('click', cashOut);
        elements.autoCashoutToggle.addEventListener('click', toggleAutoCashout);

        document.querySelectorAll('.quick-bet-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const amount = parseFloat(btn.dataset.amount);
                elements.betAmount.value = amount;
            });
        });

        elements.autoCashoutValue.addEventListener('change', (e) => {
            state.autoCashoutValue = parseFloat(e.target.value);
        });

        // Initialize
        function init() {
            updateBalance();
            updateStats();
            drawCanvas();
            startCountdown();
        }

        init();
    </script>
</body>
</html>
